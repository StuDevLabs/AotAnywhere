name: where-probe (spike)

# Throwaway experiment for ROADMAP #6 (docs/zero-path-mutation.md): measures
# which colon-free forms Windows `where /Q` accepts, to decide how to remove the
# last PATH prepend. Deleted once the question is answered.
on:
  push:
    branches: [ slang25/roadmap-tasks-2-6 ]
    paths:
      - 'eng/where-probe/**'
      - '.github/workflows/where-probe.yml'
  workflow_dispatch:

jobs:
  where-probe:
    runs-on: windows-latest
    name: where /Q colon-free form probe
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Run where probe
        run: dotnet build eng/where-probe/where-probe.proj -t:Probe -v minimal
